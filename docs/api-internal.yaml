openapi: 3.0.0

info:
  title: Go Service Blueprint API
  description: |
    Example API specification for go-service-blueprint.
    This demonstrates how to document your service API using OpenAPI 3.0.
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/halyph/go-service-blueprint
    email: your-email@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

externalDocs:
  description: "GitHub Repository"
  url: https://github.com/halyph/go-service-blueprint

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the service
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: johndoe
        email:
          type: string
          format: email
          example: john@example.com
        full_name:
          type: string
          example: John Doe
        active:
          type: boolean
          example: true
      required:
        - id
        - username
        - email